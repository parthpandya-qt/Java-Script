<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document object model</title>
</head>
<body style="background-color:#212121; color:#fff;">
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thrusday</div>
    </div>
</body>
<script>
    const parent = document.querySelector(".parent")
    //console.log(parent.children);
    for (let index = 0; index < parent.children.length; index++) {
      console.log(parent.children[index].innerText)
    }
    console.log(parent.firstElementChild.innerText)   // return the first element child
    console.log(parent.lastElementChild.innerText)     // return the last element child

    const dayOne = document.querySelector('.day')
    console.log(dayOne.parentElement);    // return the parent of the child
    console.log(dayOne.nextElementSibling);    //return the next sibling of the current element

    console.log("Nodes:",parent.childNodes); //return all the child nodelist of the parent 
</script>
</html>
