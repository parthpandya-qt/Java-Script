<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Parth Pandya</h1>
    <button id="stop">press</button>
</body>
<script>
    // const changeMe=function(){console.log("Ideot")}
    // setTimeout(changeMe,3000)
    const changeMe=function(){
        document.querySelector("h1").innerHTML="stoped"
        }
    const stopIdeot = setTimeout(changeMe,5000)
    document.querySelector("#stop").addEventListener('click',function(e){
        clearTimeout(stopIdeot);
        console.log("timeout stopped")
    },false)
    
</script>
</html>
